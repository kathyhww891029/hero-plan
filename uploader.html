<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hero-Plan 部署工具</title>
<style>
  body { font-family: system-ui; max-width: 600px; margin: 50px auto; padding: 20px; }
  .btn { padding: 12px 24px; background: #0066ff; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
  .btn:hover { background: #0055dd; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .log { background: #f5f5f5; padding: 15px; border-radius: 6px; margin-top: 20px; white-space: pre-wrap; font-size: 13px; max-height: 300px; overflow-y: auto; }
  .success { color: green; }
  .error { color: red; }
</style>
</head>
<body>
<h2>🚀 Hero-Plan 部署工具</h2>
<p>点击按钮上传修改后的文件到腾讯云</p>
<button class="btn" onclick="uploadBoth()">📤 上传 index.html 和 app.js</button>
<button class="btn" onclick="clearLog()">🗑️ 清空日志</button>
<div id="log" class="log"></div>

<script type="module">
const BUCKET = '7f9f-static-kathyhww1029-7gop3h5x37223dd9-1420290341';
const REGION = 'ap-mumbai';
const APP_DOMAIN = 'kathyhww1029-7gop3h5x37223dd9-1420290341.tcloudbaseapp.com';

function log(msg, type='') {
  const el = document.getElementById('log');
  const span = document.createElement('div');
  span.className = type;
  span.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

function cosSignature(method, path) {
  const secretKey = 'QdgaHrFdozzsa8VgeQ0NZZK0X0P3BKSe';
  const qSignTime = Math.floor(Date.now()/1000) - 60 + ';' + (Math.floor(Date.now()/1000) + 3600);
  const s = method + '\n' + path + '\n\n\n' + qSignTime + '\n';
  // SHA1 HMAC
  const h = CryptoJS.HmacSHA1(s, secretKey);
  return { signature: h.toString(CryptoJS.enc.Hex), qSignTime };
}

async function uploadFile(content, cloudPath, contentType) {
  const method = 'PUT';
  const path = '/' + cloudPath;
  const { signature, qSignTime } = cosSignature(method, path);
  const auth = `q-sign-algorithm=sha1&q-ak=AKIDaBmGdt8IKDVp9MSK0VotmSt9BzZx97tR&q-sign-time=${qSignTime}&q-key-time=${qSignTime}&q-header-list=content-type;host&q-url-param-list=&q-signature=${signature}`;
  const host = BUCKET + '.cos.' + REGION + '.myqcloud.com';

  log(`上传 ${cloudPath}...`);

  return new Promise((resolve) => {
    fetch(`https://${host}${path}`, {
      method: 'PUT',
      headers: { 'Authorization': auth, 'Content-Type': contentType, 'Content-Length': content.length, 'Host': host, 'x-cos-acl': 'public-read' },
      body: content
    }).then(res => {
      if (res.ok) { log(`✅ ${cloudPath} 上传成功`, 'success'); resolve(true); }
      else { log(`❌ ${cloudPath} HTTP ${res.status}`, 'error'); resolve(false); }
    }).catch(e => { log(`❌ ${cloudPath} ${e.message}`, 'error'); resolve(false); });
  });
}

async function uploadBoth() {
  log('开始部署...');
  // 通过 fetch 获取最新文件内容
  const files = {
    'index.html': { type: 'text/html; charset=utf-8' },
    'app.js': { type: 'application/javascript' }
  };

  let allOk = true;
  for (const [name, info] of Object.entries(files)) {
    try {
      const res = await fetch(`https://${APP_DOMAIN}/${name}?t=${Date.now()}`);
      if (!res.ok) throw new Error('获取文件失败 HTTP ' + res.status);
      const text = await res.text();
      const ok = await uploadFile(text, name, info.type);
      if (!ok) allOk = false;
    } catch(e) {
      log(`❌ ${name}: ${e.message}`, 'error');
      allOk = false;
    }
  }

  if (allOk) log('🎉 部署完成！请刷新 https://' + APP_DOMAIN, 'success');
  else log('⚠️ 部分文件上传失败，请重试', 'error');
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</body>
</html>
