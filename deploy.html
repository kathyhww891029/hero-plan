<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero-Plan 部署工具</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #fafafa; }
  h2 { color: #333; }
  .info { background: #e8f4ff; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #0066ff; }
  .info strong { color: #0066ff; }
  .status { margin: 15px 0; padding: 12px; border-radius: 6px; font-size: 14px; }
  .status.loading { background: #fff3cd; color: #856404; }
  .status.success { background: #d4edda; color: #155724; }
  .status.error { background: #f8d7da; color: #721c24; }
  .btn { display: inline-block; padding: 12px 24px; background: #0066ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 8px 4px; }
  .btn:hover { background: #0055dd; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .log { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; margin-top: 20px; white-space: pre-wrap; font-size: 12px; max-height: 250px; overflow-y: auto; font-family: monaco, monospace; }
  .log .ok { color: #4ec9b0; }
  .log .err { color: #f14c4c; }
  .log .info { color: #dcdcaa; }
  hr { margin: 25px 0; border: none; border-top: 1px solid #ddd; }
</style>
</head>
<body>

<h2>🚀 Hero-Plan CloudBase 部署工具</h2>

<div class="info">
  <strong>使用方法：</strong> 点击下方按钮，自动从本地服务器获取修复后的文件并上传到腾讯云。<br>
  ⚠️ 请确保同时打开了 <strong>Hero-Plan 应用页面</strong>（用于云数据库验证）。
</div>

<div id="status" class="status" style="display:none"></div>

<button class="btn" id="deployBtn" onclick="deploy()">📤 开始部署</button>
<button class="btn" onclick="test()">🔍 测试连接</button>
<button class="btn" onclick="clearLog()">🗑️ 清日志</button>

<hr>

<div id="log" class="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
const BUCKET = '7f9f-static-kathyhww1029-7gop3h5x37223dd9-1420290341';
const REGION = 'ap-mumbai';
const APP_DOMAIN = 'kathyhww1029-7gop3h5x37223dd9-1420290341.tcloudbaseapp.com';
const LOCAL_BASE = window.location.origin; // http://localhost:8765

function log(msg, type='') {
  const el = document.getElementById('log');
  const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : type === 'info' ? 'info' : '';
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.className = 'status ' + type;
  el.textContent = msg;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

function cosSign(method, path) {
  const key = 'QdgaHrFdozzsa8VgeQ0NZZK0X0P3BKSe';
  const t = Math.floor(Date.now()/1000);
  const qSignTime = (t-60) + ';' + (t+3600);
  const s = method + '\n' + path + '\n\n\n' + qSignTime + '\n';
  const sig = CryptoJS.HmacSHA1(s, key).toString(CryptoJS.enc.Hex);
  return { sig, qSignTime };
}

async function uploadToCOS(content, cloudPath, contentType) {
  const method = 'PUT';
  const path = '/' + cloudPath;
  const { sig, qSignTime } = cosSign(method, path);
  const auth = `q-sign-algorithm=sha1&q-ak=AKIDaBmGdt8IKDVp9MSK0VotmSt9BzZx97tR&q-sign-time=${qSignTime}&q-key-time=${qSignTime}&q-header-list=content-type;host&q-url-param-list=&q-signature=${sig}`;
  const host = BUCKET + '.cos.' + REGION + '.myqcloud.com';

  return fetch(`https://${host}${path}`, {
    method,
    headers: { 'Authorization': auth, 'Content-Type': contentType, 'Content-Length': content.length, 'Host': host, 'x-cos-acl': 'public-read' },
    body: content
  }).then(r => ({ ok: r.ok, status: r.status }));
}

async function fetchLocal(path) {
  const r = await fetch(LOCAL_BASE + '/' + path + '?t=' + Date.now());
  if (!r.ok) throw new Error(`获取 ${path} 失败: HTTP ${r.status}`);
  return r.text();
}

async function test() {
  log('测试连接...', 'info');
  try {
    // 测试 COS 写入
    const r = await uploadToCOS('ping', 'test-ping.txt', 'text/plain');
    log('COS 写入测试: ' + (r.ok ? '成功 ✅' : '失败 ❌'), r.ok ? 'ok' : 'err');
    // 测试本地文件读取
    const html = await fetchLocal('index.html');
    log('本地 index.html 读取: 成功 ✅ (' + html.length + ' 字节)', 'ok');
    const js = await fetchLocal('app.js');
    log('本地 app.js 读取: 成功 ✅ (' + js.length + ' 字节)', 'ok');
  } catch(e) {
    log('测试失败: ' + e.message, 'err');
  }
}

async function deploy() {
  const btn = document.getElementById('deployBtn');
  btn.disabled = true;
  setStatus('部署中...', 'loading');
  log('🚀 开始部署 Hero-Plan 到腾讯云', 'info');

  const files = [
    { name: 'index.html', type: 'text/html; charset=utf-8' },
    { name: 'app.js', type: 'application/javascript' }
  ];

  let allOk = true;
  for (const f of files) {
    try {
      log(`📦 获取 ${f.name}...`);
      const content = await fetchLocal(f.name);
      log(`   本地大小: ${content.length} 字节`);

      log(`⬆️ 上传 ${f.name} 到 COS...`);
      const result = await uploadToCOS(content, f.name, f.type);

      if (result.ok) {
        log(`   ✅ ${f.name} 上传成功`, 'ok');
      } else {
        log(`   ❌ ${f.name} 上传失败: HTTP ${result.status}`, 'err');
        allOk = false;
      }
    } catch(e) {
      log(`   ❌ ${f.name}: ${e.message}`, 'err');
      allOk = false;
    }
  }

  btn.disabled = false;

  if (allOk) {
    setStatus('🎉 部署成功！请刷新 Hero-Plan 应用', 'success');
    log('\n🎉 部署完成！请刷新 https://' + APP_DOMAIN, 'ok');
  } else {
    setStatus('⚠️ 部分文件上传失败，请重试', 'error');
  }
}
</script>
</body>
</html>
